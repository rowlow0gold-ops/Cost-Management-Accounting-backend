spring:
  application:
    name: cost-mgmt
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-very-long-secret-key-for-jwt-signing-min-32-bytes}
    expiration-ms: 86400000   # 24h
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.noaats.cost: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:costdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      data-locations: classpath:data-h2.sql
  h2:
    console:
      enabled: true
      path: /h2

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}?reWriteBatchedInserts=true
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
